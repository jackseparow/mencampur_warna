<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Blockly Color Mixer - Taman Numerasi</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; display: flex; flex-direction: column; align-items: center; }
        h2 { color: #2c3e50; margin-top: 20px; }
        #blocklyDiv { height: 480px; width: 800px; border: 2px solid #34495e; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #preview-container { margin-top: 25px; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        #preview-box { width: 120px; height: 120px; margin: 15px auto; border: 4px solid #ecf0f1; border-radius: 50%; background-color: #fff; transition: background-color 0.3s ease; }
        #hex-label { font-weight: bold; font-size: 1.2em; color: #7f8c8d; }
        .instruction { font-size: 0.9em; color: #95a5a6; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>🎨 Simulasi Campur Warna - Taman Numerasi</h2>
    <p class="instruction">Tarik blok "campur" dan masukkan warna dasar ke dalamnya!</p>

    <div id="blocklyDiv"></div>

    <div id="preview-container">
        <h3>Hasil Campuran</h3>
        <div id="preview-box"></div>
        <div id="hex-label">#FFFFFF</div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Warna Dasar" colour="230">
            <block type="color_picker_custom">
                <field name="COL">#ff0000</field>
                <field name="LABEL">MERAH</field>
            </block>
            <block type="color_picker_custom">
                <field name="COL">#ffff00</field>
                <field name="LABEL">KUNING</field>
            </block>
            <block type="color_picker_custom">
                <field name="COL">#0000ff</field>
                <field name="LABEL">BIRU</field>
            </block>
            <block type="color_picker_custom">
                <field name="COL">#000000</field>
                <field name="LABEL">HITAM</field>
            </block>
            <block type="color_picker_custom">
                <field name="COL">#ffffff</field>
                <field name="LABEL">PUTIH</field>
            </block>
        </category>
        <category name="Alat Campur" colour="160">
            <block type="color_mixer"></block>
        </category>
    </xml>

    <script src="blocks.js"></script>
    <script src="generator.js"></script>
    <script>
        // 1. Inisialisasi Workspace
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            scrollbars: true,
            trashcan: true
        });

        // 2. Fungsi Logika Matematika Warna
        function mixColors(color1, color2) {
            // Jika input kosong (belum dipasang blok), anggap putih
            const c1 = color1 || "#ffffff";
            const c2 = color2 || "#ffffff";

            const r1 = parseInt(c1.substring(1, 3), 16);
            const g1 = parseInt(c1.substring(3, 5), 16);
            const b1 = parseInt(c1.substring(5, 7), 16);

            const r2 = parseInt(c2.substring(1, 3), 16);
            const g2 = parseInt(c2.substring(3, 5), 16);
            const b2 = parseInt(c2.substring(5, 7), 16);

            const r = Math.floor((r1 + r2) / 2);
            const g = Math.floor((g1 + g2) / 2);
            const b = Math.floor((b1 + b2) / 2);

            const toHex = (c) => c.toString(16).padStart(2, '0');
            return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
        }

        // 3. Listener Otomatis (Menggantikan Tombol Run)
        function updatePreview() {
            // Menghasilkan kode JavaScript dari blok di workspace
            const code = javascript.javascriptGenerator.workspaceToCode(workspace);
            
            try {
                // Menjalankan kode tersebut (eval) untuk mendapatkan nilai hex hasil mixColors
                const resultColor = eval(code);
                
                if (resultColor) {
                    document.getElementById('preview-box').style.backgroundColor = resultColor;
                    document.getElementById('hex-label').innerText = resultColor.toUpperCase();
                }
            } catch (e) {
                // Diamkan jika blok belum tersambung sempurna
            }
        }

        // Jalankan update setiap kali ada perubahan di workspace
        workspace.addChangeListener(updatePreview);
    </script>
</body>
</html>
