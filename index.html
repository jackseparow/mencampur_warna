<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Taman Numerasi - Lab Warna</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        h2 { color: #2c3e50; }
        #main-container { display: flex; gap: 20px; width: 1000px; max-width: 95vw; }
        #blocklyDiv { height: 550px; flex-grow: 1; border: 3px solid #2c3e50; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #sidebar { width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #preview-box { width: 100px; height: 100px; margin: 15px auto; border-radius: 50%; border: 5px solid #eee; background: #fff; transition: background-color 0.3s; }
        #hex-label { font-size: 1.2em; font-weight: bold; color: #34495e; margin-bottom: 10px; }
        .storage-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .bottle { width: 60px; height: 80px; border: 2px solid #333; border-radius: 5px 5px 20px 20px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; box-shadow: inset 0 -10px 10px rgba(0,0,0,0.05); }
        button { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        button:hover { background: #219150; }
    </style>
</head>
<body>

    <h2>🎨 Lab Warna Taman Numerasi</h2>

    <div id="main-container">
        <div id="blocklyDiv"></div>

        <div id="sidebar">
            <div class="panel">
                <h3>Hasil Campuran</h3>
                <div id="preview-box"></div>
                <div id="hex-label">#FFFFFF</div>
                <button onclick="saveToStorage()">Simpan ke Rak</button>
            </div>

            <div class="panel">
                <h3>Rak Botol</h3>
                <div class="storage-grid">
                    <div id="bottle-0" class="bottle">Botol 1</div>
                    <div id="bottle-1" class="bottle">Botol 2</div>
                    <div id="bottle-2" class="bottle">Botol 3</div>
                </div>
                <p style="font-size: 11px; color: #7f8c8d; margin-top: 10px;">Gunakan blok "Ambil dari Rak" untuk memakai kembali warna ini.</p>
            </div>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Warna Dasar" colour="230">
            <block type="color_picker_custom"><field name="COL">#ff0000</field><field name="LABEL">MERAH</field></block>
            <block type="color_picker_custom"><field name="COL">#ffff00</field><field name="LABEL">KUNING</field></block>
            <block type="color_picker_custom"><field name="COL">#0000ff</field><field name="LABEL">BIRU</field></block>
            <block type="color_picker_custom"><field name="COL">#ffffff</field><field name="LABEL">PUTIH</field></block>
            <block type="color_picker_custom"><field name="COL">#000000</field><field name="LABEL">HITAM</field></block>
        </category>
        <category name="Numerasi & Campur" colour="160">
            <block type="color_mixer_ratio"></block>
            <block type="get_stored_color"></block>
        </category>
    </xml>

    <script src="blocks.js"></script>
    <script src="generator.js"></script>
    <script>
        const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), trashcan: true });
        let storage = ["#ffffff", "#ffffff", "#ffffff"];
        let currentColor = "#ffffff";

        // Fungsi Matematika Warna (Weighted Average)
        function mixColorsRatio(c1, r1, c2, r2) {
            const getRGB = (hex) => hex.match(/\w\w/g).map(x => parseInt(x, 16));
            const rgb1 = getRGB(c1);
            const rgb2 = getRGB(c2);
            const total = parseFloat(r1) + parseFloat(r2);

            const r = Math.floor((rgb1[0] * r1 + rgb2[0] * r2) / total);
            const g = Math.floor((rgb1[1] * r1 + rgb2[1] * r2) / total);
            const b = Math.floor((rgb1[2] * r1 + rgb2[2] * r2) / total);

            const toHex = (n) => n.toString(16).padStart(2, '0');
            return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
        }

        function getStorageColor(id) { return storage[id]; }

        function saveToStorage() {
            const id = prompt("Simpan di botol nomor berapa? (1, 2, atau 3)") - 1;
            if (id >= 0 && id <= 2) {
                storage[id] = currentColor;
                document.getElementById(`bottle-${id}`).style.backgroundColor = currentColor;
                // Trigger Blockly agar sadar ada perubahan di rak
                workspace.fireChangeListener(new Blockly.Events.BlockChange()); 
            }
        }

        // Jalankan setiap ada perubahan blok
        workspace.addChangeListener(() => {
            const code = javascript.javascriptGenerator.workspaceToCode(workspace);
            try {
                const result = eval(code);
                if (result && result.startsWith('#')) {
                    currentColor = result;
                    document.getElementById('preview-box').style.backgroundColor = result;
                    document.getElementById('hex-label').innerText = result.toUpperCase();
                }
            } catch (e) {}
        });
    </script>
</body>
</html>
