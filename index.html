<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Taman Numerasi - Lab Warna</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; }
        #main-container { display: flex; gap: 20px; margin-top: 20px; width: 95%; }
        #blocklyDiv { height: 550px; flex-grow: 1; border: 3px solid #2c3e50; border-radius: 10px; }
        #sidebar { width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .panel { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #preview-box { width: 80px; height: 80px; margin: 10px auto; border-radius: 50%; border: 3px solid #ddd; background: #fff; }
        .storage-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .bottle { width: 60px; height: 80px; border: 2px solid #333; border-radius: 5px 5px 20px 20px; background: #eee; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        button { background: #27ae60; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; }
        button:hover { background: #2ecc71; }
    </style>
</head>
<body>

    <h2>🎨 Lab Warna Numerasi</h2>

    <div id="main-container">
        <div id="blocklyDiv"></div>

        <div id="sidebar">
            <div class="panel">
                <h3>Hasil Campuran</h3>
                <div id="preview-box"></div>
                <div id="hex-label">#FFFFFF</div>
                <div id="ratio-label" style="font-size: 12px; color: #666; margin-top: 5px;">Rasio: 1 : 1</div>
                <button onclick="saveToStorage()" style="margin-top: 10px;">Simpan ke Rak</button>
            </div>

            <div class="panel">
                <h3>Rak Penyimpanan</h3>
                <div class="storage-grid">
                    <div id="bottle-0" class="bottle">Botol 1</div>
                    <div id="bottle-1" class="bottle">Botol 2</div>
                    <div id="bottle-2" class="bottle">Botol 3</div>
                </div>
                <p style="font-size: 11px; color: #7f8c8d; margin-top: 10px;">*Warna di rak bisa dipanggil lewat blok "ambil dari rak"</p>
            </div>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Warna Dasar" colour="230">
            <block type="color_picker_custom"><field name="COL">#ff0000</field><field name="LABEL">MERAH</field></block>
            <block type="color_picker_custom"><field name="COL">#ffff00</field><field name="LABEL">KUNING</field></block>
            <block type="color_picker_custom"><field name="COL">#0000ff</field><field name="LABEL">BIRU</field></block>
            <block type="color_picker_custom"><field name="COL">#000000</field><field name="LABEL">HITAM</field></block>
            <block type="color_picker_custom"><field name="COL">#ffffff</field><field name="LABEL">PUTIH</field></block>
        </category>
        <category name="Percampuran" colour="160">
            <block type="color_mixer_ratio"></block>
            <block type="get_stored_color"></block>
        </category>
    </xml>

    <script src="blocks.js"></script>
    <script src="generator.js"></script>
    <script>
        const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox') });
        let storage = ["#ffffff", "#ffffff", "#ffffff"];
        let currentColor = "#ffffff";

        // Fungsi Campur dengan Rasio (Matematika Numerasi)
        function mixColorsRatio(c1, r1, c2, r2) {
            const getRGB = (hex) => [
                parseInt(hex.substring(1, 3), 16),
                parseInt(hex.substring(3, 5), 16),
                parseInt(hex.substring(5, 7), 16)
            ];

            const rgb1 = getRGB(c1);
            const rgb2 = getRGB(c2);
            const total = parseFloat(r1) + parseFloat(r2);

            const r = Math.floor((rgb1[0] * r1 + rgb2[0] * r2) / total);
            const g = Math.floor((rgb1[1] * r1 + rgb2[1] * r2) / total);
            const b = Math.floor((rgb1[2] * r1 + rgb2[2] * r2) / total);

            const toHex = (n) => n.toString(16).padStart(2, '0');
            return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
        }

        function getStorageColor(id) { return storage[id]; }

        function saveToStorage() {
            const id = prompt("Simpan di botol nomor berapa? (1, 2, atau 3)") - 1;
            if (id >= 0 && id <= 2) {
                storage[id] = currentColor;
                document.getElementById(`bottle-${id}`).style.backgroundColor = currentColor;
                workspace.fireChangeListener(new Blockly.Events.BlockChange()); 
            }
        }

        workspace.addChangeListener(() => {
            const code = javascript.javascriptGenerator.workspaceToCode(workspace);
            try {
                currentColor = eval(code) || "#ffffff";
                document.getElementById('preview-box').style.backgroundColor = currentColor;
                document.getElementById('hex-label').innerText = currentColor.toUpperCase();
            } catch (e) {}
        });
    </script>
</body>
</html>
